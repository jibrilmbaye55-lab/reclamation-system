<!DOCTYPE html>
<html>
<head>
    <title>Réclamation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📝 Déposer une réclamation</h2>

<form method="POST" action="/submit">

    <!-- NOM -->
    <label>Nom (optionnel):</label>
    <input type="text" name="nom" placeholder="Votre nom">

    <!-- ✅ TELEPHONE -->
    <label>Téléphone (important pour réponse):</label>
    <input type="tel" name="telephone" placeholder="Ex: 771234567" pattern="[0-9]{9,}" required>
    <div class="info">Format recommandé : 77XXXXXXXX</div>

    <!-- TYPE -->
    <label>Type :</label>
    <select name="type">
        <option>Étudiant</option>
        <option>Patient</option>
        <option>Personnel</option>
    </select>

    <!-- SERVICE -->
    <label>Service :</label>
    <select name="service">
        <option>Laboratoire</option>
        <option>Accueil</option>
        <option>Urgence</option>
        <option>Administration</option>
    </select>

    <!-- MESSAGE -->
    <label>Message :</label>
    <textarea name="message" required placeholder="Décrivez votre problème..."></textarea>

    <!-- URGENCE -->
    <label>Urgence :</label>
    <select name="urgence">
        <option>Faible</option>
        <option>Moyenne</option>
        <option>Élevée</option>
    </select>

    <button type="submit">📩 Envoyer la réclamation</button>

</form>

</div>

</body>
</html>
