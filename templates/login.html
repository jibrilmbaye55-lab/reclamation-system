<!DOCTYPE html>
<html>
<head>
    <title>Connexion Admin</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #3498db;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .error {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .remember {
            display: flex;
            align-items: center;
            justify-content: left;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h2>🔐 Connexion Admin</h2>

    <!-- ❌ MESSAGE ERREUR -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <input type="text" name="username" placeholder="Utilisateur" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Mot de passe" required>
            <span class="toggle" onclick="togglePassword()">👁️</span>
        </div>

        <!-- 🧠 REMEMBER -->
        <div class="remember">
            <input type="checkbox" name="remember"> Se souvenir de moi
        </div>

        <button type="submit">Se connecter</button>

    </form>

    <div class="footer">
        Système de réclamation
    </div>

</div>

<!-- 👁️ SCRIPT -->
<script>
function togglePassword() {
    var pwd = document.getElementById("password");
    if (pwd.type === "password") {
        pwd.type = "text";
    } else {
        pwd.type = "password";
    }
}
</script>

</body>
</html>
